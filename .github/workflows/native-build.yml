name: GraalVM Native Image Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write  # Required for creating releases

jobs:
  build-native:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact-name: fleet-navigator-linux-amd64
            binary-path: target/fleet-navigator
          - os: windows-latest
            artifact-name: fleet-navigator-windows-amd64
            binary-path: target/fleet-navigator.exe
          - os: macos-latest
            artifact-name: fleet-navigator-macos-amd64
            binary-path: target/fleet-navigator

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          components: 'native-image'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build Native Image (Linux)
        if: runner.os == 'Linux'
        run: |
          # Use compatibility mode for maximum CPU compatibility (x86-64 baseline)
          mvn -Pnative clean package -DskipTests \
            "-Dnative.buildArg=-march=compatibility"

      - name: Build Native Image (macOS)
        if: runner.os == 'macOS'
        run: |
          # Use compatibility mode for maximum CPU compatibility (Intel Macs)
          mvn -Pnative clean package -DskipTests \
            "-Dnative.buildArg=-march=compatibility"

      - name: Setup Visual Studio (Windows)
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@v2

      - name: Build Native Image (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Use GitHub Actions runner's Visual Studio with explicit AMD64 architecture
          & "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\Launch-VsDevShell.ps1" -Arch amd64 -HostArch amd64
          # Windows: Use compatibility mode for older CPUs
          mvn -Pnative clean package -DskipTests "-Dnative.buildArg=-march=compatibility"

      - name: Package Binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          tar -czf ${{ matrix.artifact-name }}.tar.gz \
            ${{ matrix.binary-path }} \
            README.md \
            docs/NATIVE-IMAGE.md

      - name: Package Binary (Windows)
        if: runner.os == 'Windows'
        run: |
          7z a ${{ matrix.artifact-name }}.zip `
            ${{ matrix.binary-path }} `
            README.md `
            docs/NATIVE-IMAGE.md

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            ${{ matrix.artifact-name }}.tar.gz
            ${{ matrix.artifact-name }}.zip
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.artifact-name }}.tar.gz
            ${{ matrix.artifact-name }}.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
