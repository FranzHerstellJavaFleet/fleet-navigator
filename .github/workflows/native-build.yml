name: GraalVM Native Image Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-native:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact-name: fleet-navigator-linux-amd64
            binary-path: target/fleet-navigator
          - os: windows-latest
            artifact-name: fleet-navigator-windows-amd64
            binary-path: target/fleet-navigator.exe
          - os: macos-latest
            artifact-name: fleet-navigator-macos-amd64
            binary-path: target/fleet-navigator

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          components: 'native-image'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build JAR with Frontend
        run: mvn clean package -DskipTests

      - name: Build Native Image (Linux/macOS)
        if: runner.os != 'Windows'
        run: mvn -Pnative native:compile -DskipTests

      - name: Build Native Image (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          mvn -Pnative native:compile -DskipTests

      - name: Package Binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          tar -czf ${{ matrix.artifact-name }}.tar.gz \
            ${{ matrix.binary-path }} \
            README.md \
            NATIVE-IMAGE.md

      - name: Package Binary (Windows)
        if: runner.os == 'Windows'
        run: |
          7z a ${{ matrix.artifact-name }}.zip `
            ${{ matrix.binary-path }} `
            README.md `
            NATIVE-IMAGE.md

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            ${{ matrix.artifact-name }}.tar.gz
            ${{ matrix.artifact-name }}.zip
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ matrix.artifact-name }}.tar.gz
            ${{ matrix.artifact-name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
