name: Java JAR Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write  # Required for creating releases

jobs:
  build-jar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build JAR
        run: |
          mvn clean package -DskipTests

      - name: Get version from pom.xml
        id: version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Package JAR
        run: |
          mkdir -p release
          cp target/fleet-navigator-*.jar release/fleet-navigator.jar
          cp README.md release/
          cp docs/INSTALL.md release/ || echo "INSTALL.md not found, skipping"
          tar -czf fleet-navigator-${{ steps.version.outputs.VERSION }}.tar.gz -C release .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fleet-navigator-jar
          path: fleet-navigator-*.tar.gz
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: fleet-navigator-*.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Fleet Navigator JAR Release

            **Plattform-unabhängiges Java JAR**

            ### Installation:
            ```bash
            # Download und entpacken
            tar -xzf fleet-navigator-*.tar.gz

            # Starten (Java 21 erforderlich)
            java -jar fleet-navigator.jar
            ```

            ### Systemanforderungen:
            - Java 21 oder höher
            - 2 GB RAM empfohlen
            - llama.cpp server (optional, für lokale LLM-Unterstützung)

            ### Erste Schritte:
            1. JAR herunterladen und entpacken
            2. `java -jar fleet-navigator.jar` ausführen
            3. Browser öffnen: http://localhost:2025
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
